<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstudaAI - Modo Leitura por Página</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        /* ==========================================================================
           Estilos Globais e Reset
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            transition: background-color 0.3s;
        }

        h1 {
            color: #008b8b;
            text-align: center;
            margin-bottom: 25px;
            font-size: 2.2rem;
            font-weight: 700;
        }

        /* ==========================================================================
           Área de Upload e Controles Superiores
           ========================================================================== */
        .upload-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9fbfb;
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px dashed #008b8b;
            margin-bottom: 25px;
        }

        input[type="file"] {
            color: #555;
            font-size: 0.95rem;
        }

        .top-actions {
            display: flex;
            gap: 10px;
        }

        .btn-utility {
            background: #e6f2f2;
            color: #008b8b;
            border: 1px solid #008b8b;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-utility:hover {
            background: #008b8b;
            color: #fff;
        }

        /* ==========================================================================
           Modo Foco / Display de Texto (Ajustado para Páginas Inteiras)
           ========================================================================== */
        .focus-mode-container {
            margin: 25px 0;
        }

        #lineCurrent {
            font-size: 1.35rem;
            font-weight: bold;
            color: #008b8b;
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            line-height: 1.7;
            border-left: 6px solid #008b8b;
            
            min-height: 400px;       
            max-height: 650px;       
            overflow-y: auto;        
            text-align: justify;     
        }

        .next-lines-preview {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #ccc;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #lineNext1, #lineNext2 {
            font-size: 1.05rem;
            color: #666;
            font-style: italic;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #lineCurrent::-webkit-scrollbar {
            width: 8px;
        }
        #lineCurrent::-webkit-scrollbar-thumb {
            background-color: #008b8b;
            border-radius: 4px;
        }
        #lineCurrent::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        /* ==========================================================================
           Painel de Controles de Áudio (Player Otimizado)
           ========================================================================== */
        .audio-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .btn-player {
            background: #008b8b;
            color: #fff;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,139,139,0.3);
            transition: all 0.2s;
        }

        .btn-player:hover {
            background: #006666;
            transform: translateY(-2px);
        }

        #stopBtn {
            background: #d9534f;
            box-shadow: 0 4px 10px rgba(217,83,79,0.3);
        }

        #stopBtn:hover {
            background: #c9302c;
        }

        .rate-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f4f7f6;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            color: #555;
        }

        .rate-control input[type="range"] {
            cursor: pointer;
            accent-color: #008b8b;
        }

        /* ==========================================================================
           Barra de Progresso Dinâmica
           ========================================================================== */
        .progress-container {
            margin: 25px 0;
        }

        .progress-bar-bg {
            background: #e9ecef;
            width: 100%;
            height: 14px;
            border-radius: 7px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #20b2aa, #008b8b);
            width: 0%;
            height: 100%;
            border-radius: 7px;
            transition: width 0.3s ease;
        }

        #progressText {
            font-size: 0.95rem;
            color: #666;
            text-align: right;
            font-weight: 600;
        }

        /* ==========================================================================
           Componente da Prateleira de Livros (IndexedDB)
           ========================================================================== */
        .shelf-section {
            margin-top: 30px;
            border-top: 1px solid #e0e0e0;
            padding-top: 20px;
        }

        .shelf-toggle {
            width: 100%;
            background: none;
            border: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: #444;
            cursor: pointer;
            padding: 5px 0;
        }

        .book-list {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .book-list.show {
            display: grid;
        }

        .book-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            transition: all 0.2s;
        }

        .book-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 12px rgba(0,0,0,0.08);
        }

        .book-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            padding-right: 20px;
        }

        .book-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: #333;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .book-percentage {
            font-size: 0.85rem;
            color: #008b8b;
            font-weight: 700;
            margin-left: 5px;
        }

        .btn-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .btn-delete:hover {
            opacity: 1;
        }

        .book-mini-progress-bg {
            background: #eee;
            height: 5px;
            border-radius: 3px;
            width: 100%;
            overflow: hidden;
            margin-top: auto;
        }

        .book-mini-progress-fill {
            background: #008b8b;
            height: 100%;
        }

        /* ==========================================================================
           Modal do Texto Completo (Biblioteca Virtual)
           ========================================================================== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(3px);
        }

        .modal-content {
            background: #fff;
            width: 90%;
            max-width: 900px;
            height: 85vh;
            border-radius: 12px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .modal-content h3 {
            margin-bottom: 15px;
            color: #333;
        }

        #modalTextArea {
            flex: 1;
            width: 100%;
            resize: none;
            padding: 20px;
            font-size: 1.05rem;
            line-height: 1.6;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            background-color: #fafafa;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }

        /* ==========================================================================
           Regras do Modo Escuro (Dark Mode)
           ========================================================================== */
        body.dark-mode {
            background-color: #121212;
            color: #e0e0e0;
        }

        body.dark-mode .container {
            background-color: #1e1e1e;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        body.dark-mode h1 {
            color: #40e0d0;
        }

        body.dark-mode .upload-section {
            background-color: #252525;
            border-color: #40e0d0;
        }

        body.dark-mode input[type="file"] {
            color: #bbb;
        }

        body.dark-mode .btn-utility {
            background: #253a3a;
            color: #40e0d0;
            border-color: #40e0d0;
        }

        body.dark-mode .btn-utility:hover {
            background: #40e0d0;
            color: #121212;
        }

        body.dark-mode #lineCurrent {
            background-color: #2d2d2d;
            color: #40e0d0;
            border-left-color: #40e0d0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        body.dark-mode .next-lines-preview {
            background-color: #252525;
            border-left-color: #555;
        }

        body.dark-mode #lineNext1, body.dark-mode #lineNext2 {
            color: #aaa;
        }

        body.dark-mode .btn-player {
            background: #00a3a3;
            box-shadow: 0 4px 10px rgba(0,163,163,0.3);
        }

        body.dark-mode .btn-player:hover {
            background: #40e0d0;
            color: #121212;
        }

        body.dark-mode .rate-control {
            background-color: #252525;
            color: #bbb;
        }

        body.dark-mode .shelf-toggle {
            color: #eee;
        }

        body.dark-mode .book-card {
            background-color: #252525;
            border-color: #383838;
        }

        body.dark-mode .book-name {
            color: #eee;
        }

        body.dark-mode .book-mini-progress-bg {
            background-color: #383838;
        }

        body.dark-mode .book-mini-progress-fill {
            background-color: #40e0d0;
        }

        body.dark-mode .modal-content {
            background-color: #1e1e1e;
            color: #fff;
        }

        body.dark-mode .modal-content h3 {
            color: #fff;
        }

        body.dark-mode #modalTextArea {
            background-color: #2d2d2d;
            color: #fff;
            border-color: #444;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>EstudaAI</h1>

        <div class="upload-section">
            <input type="file" id="fileInput" accept=".txt,.pdf">
            <div class="top-actions">
                <button class="btn-utility" id="openModalBtn">📋 Ver Texto Completo</button>
                <button class="btn-utility" id="toggleDarkModeBtn">🌙 Modo Escuro</button>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
            <div id="progressText">Página 0 de 0 (0%)</div>
        </div>

        <div class="focus-mode-container">
            <div id="lineCurrent">Selecione um arquivo ou escolha um livro na prateleira para começar...</div>
            
            <div class="next-lines-preview">
                <div id="lineNext1"></div>
                <div id="lineNext2"></div>
            </div>
        </div>

        <div class="audio-controls">
            <button class="btn-utility" id="diminuirFonteBtn" title="Diminuir Fonte">A-</button>
            <button class="btn-player" id="prevBtn" title="Página Anterior">⏮</button>
            
            <button class="btn-player" id="playBtn" title="Iniciar/Pausar Leitura">▶</button>
            
            <button class="btn-player" id="nextBtn" title="Próxima Página">⏭</button>
            <button class="btn-player" id="stopBtn" title="Reiniciar Leitura">🛑</button>
            <button class="btn-utility" id="aumentarFonteBtn" title="Aumentar Fonte">A+</button>

            <div class="rate-control">
                <span>Velocidade:</span>
                <input type="range" id="rate" min="0.5" max="3" step="0.1" value="1.2">
                <span id="rateValue">1.2x</span>
            </div>
        </div>

        <div class="shelf-section">
            <button class="shelf-toggle" id="shelfToggleBtn">
                <span>📚 Minha Prateleira de Estudos</span>
                <span id="shelfArrow">▶</span>
            </button>
            <div class="book-list" id="bookList"></div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <h3>Texto Completo do Documento</h3>
            <textarea id="modalTextArea" readonly></textarea>
            <div class="modal-actions">
                <button class="btn-utility" id="closeModalBtn">Fechar Painel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
